<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche Technique : Hydrocéphalie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>FICHE TECHNIQUE : HYDROCÉPHALIE</h1>
  </header>

  <main>
    <form id="ficheForm">

      <!-- IDENTIFICATION DU PATIENT -->
      <section class="fiche-section">
        <h2>IDENTIFICATION DU PATIENT</h2>
        <label>Nom : <input type="text" id="nom" placeholder="Nom"></label>
        <label>Prénom : <input type="text" id="prenom" placeholder="Prénom"></label>
        <p>Sexe :
          <label><input type="radio" name="sexe" value="M"> M</label>
          <label><input type="radio" name="sexe" value="F"> F</label>
        </p>
        <label>Date de naissance : <input type="date" id="date_naissance"></label>
      </section>

      <hr>

      <!-- ANTÉCÉDENTS -->
      <section class="fiche-section">
        <h2>ANTÉCÉDENTS</h2>

        <h3>Pédiatriques / Néonataux</h3>
        <label><input type="checkbox" id="prematurite"> Prématurité</label>
        <label><input type="checkbox" id="hemorragie_iv"> Hémorragie intraventriculaire</label>
        <label><input type="checkbox" id="spina_bifida"> Spina bifida</label>
        <label><input type="checkbox" id="meningite"> Méningite</label>

        <h3>Adultes</h3>
        <label><input type="checkbox" id="tc"> TC (Trauma Crânien)</label>
        <label><input type="checkbox" id="avc"> AVC / Hémorragie méningée</label>
        <label><input type="checkbox" id="tumeur"> Tumeur</label>
        <label><input type="checkbox" id="chirurgie_anterieure"> Chirurgie antérieure</label>
      </section>

      <hr>

      <!-- CIRCONSTANCES DE DÉCOUVERTE -->
      <section class="fiche-section">
        <h2>CIRCONSTANCES DE DÉCOUVERTE</h2>
        <label><input type="checkbox" id="macrocranie"> Macrocrânie (Nourrisson)</label>
        <label><input type="checkbox" id="cephalees"> Céphalées / Vomissements</label>
        <label><input type="checkbox" id="troubles_marche"> Troubles de la marche</label>
        <label><input type="checkbox" id="incontinence"> Incontinence</label>
        <label><input type="checkbox" id="regard_soleil"> Regard en coucher de soleil</label>
        <label><input type="checkbox" id="fontanelle_tendue"> Fontanelle tendue</label>
        <label><input type="checkbox" id="troubles_memoire"> Troubles cognitifs / Mémoire</label>
      </section>

      <hr>

      <!-- EXAMEN CLINIQUE -->
      <section class="fiche-section">
        <h2>EXAMEN CLINIQUE</h2>
        <label>Poids (kg) : <input type="number" id="poids_kg" placeholder="kg"></label>
        <label>Taille (cm) : <input type="number" id="taille_cm" placeholder="cm"></label>
        <label>Périmètre Crânien (PC) : <input type="number" id="pc_cm" placeholder="cm"></label>
        <label>Score de Glasgow : <input type="number" id="glasgow" min="3" max="15"></label>
        <label>Examen Neurologique : <input type="text" id="examen_neuro"></label>
      </section>

      <hr>

      <!-- IMAGERIE -->
      <section class="fiche-section">
        <h2>IMAGERIE</h2>
        <label><input type="checkbox" id="scanner"> Scanner cérébral (TDM)</label>
        <label><input type="checkbox" id="irm"> IRM cérébrale</label>
        <label><input type="checkbox" id="echographie"> Échographie (ETF)</label>
        <label>Commentaires / Indice d'Evans : <input type="text" id="indice_evans"></label>
      </section>

      <hr>

      <!-- BIOLOGIE -->
      <section class="fiche-section">
        <h2>BIOLOGIE</h2>
        <label>Glycémie : <input type="text" id="glycemie"></label>
        <label>LCR - Protéinorachie : <input type="text" id="proteinorachie"></label>
        <label>LCR - Glycorachie : <input type="text" id="glycorachie"></label>
        <label>LCR - Cytologie : <input type="text" id="cytologie_lcr"></label>
        <label>LCR - Culture : <input type="text" id="culture_lcr"></label>
      </section>

      <hr>

      <!-- PRISE EN CHARGE ET ÉVOLUTION -->
      <section class="fiche-section">
        <h2>PRISE EN CHARGE ET ÉVOLUTION</h2>
        <p>Intervention :
          <label><input type="checkbox" id="dvp"> DVP</label>
          <label><input type="checkbox" id="dva"> DVA</label>
          <label><input type="checkbox" id="vcs"> VCS (Endoscopie)</label>
        </p>
        <label>Date d'intervention : <input type="date" id="date_intervention"></label>
        <label>Type de valve : <input type="text" id="type_valve"></label>
        <p>Évolution :
          <label><input type="checkbox" id="evo_favorable"> Favorable</label>
          <label><input type="checkbox" id="evo_stable"> Stable</label>
          <label><input type="checkbox" id="evo_defavorable"> Défavorable</label>
        </p>
        <label>Date dernière consultation : <input type="date" id="date_derniere_consultation"></label>
      </section>

      <hr>

      <!-- Boutons -->
      <div style="text-align:center; margin:20px 0;">
        <button type="button" id="generateFiche">Télécharger la fiche (.md)</button>
        <button type="reset">Réinitialiser</button>
      </div>

    </form>
  </main>

  <footer>
    <p>&copy; 2026 Fiche Technique Hydrocéphalie</p>
  </footer>

  <!-- Script JS -->
  <script src="app.js"></script>
</body>
</html>
