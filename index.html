<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche Technique : Hydrocéphalie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>FICHE TECHNIQUE : HYDROCÉPHALIE</h1>
</header>

<main>
<form id="ficheForm">

  <!-- IDENTIFICATION -->
  <section class="fiche-section">
    <h2>IDENTIFICATION</h2>

    <div class="grid-2">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="nom">
      </div>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="prenom">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Sexe</label>
        <div class="inline">
          <label><input type="radio" name="sexe" value="M"> M</label>
          <label><input type="radio" name="sexe" value="F"> F</label>
        </div>
      </div>

      <div class="form-group">
        <label>Date de naissance</label>
        <input type="date" id="date_naissance">
      </div>
    </div>
  </section>

  <!-- ANTECEDENTS -->
  <section class="fiche-section">
    <h2>ANTÉCÉDENTS</h2>

    <div class="grid-2">

      <div>
        <h3>Pédiatriques</h3>
        <div class="check-grid">
          <label><input type="checkbox" id="prematurite"> Prématurité</label>
          <label><input type="checkbox" id="hemorragie_iv"> Hémorragie IV</label>
          <label><input type="checkbox" id="spina_bifida"> Spina bifida</label>
          <label><input type="checkbox" id="meningite"> Méningite</label>
        </div>
      </div>

      <div>
        <h3>Adultes</h3>
        <div class="check-grid">
          <label><input type="checkbox" id="tc"> TC</label>
          <label><input type="checkbox" id="avc"> AVC</label>
          <label><input type="checkbox" id="tumeur"> Tumeur</label>
          <label><input type="checkbox" id="chirurgie_anterieure"> Chirurgie</label>
        </div>
      </div>

    </div>
  </section>

  <!-- DECOUVERTE -->
  <section class="fiche-section">
    <h2>DÉCOUVERTE</h2>

    <div class="check-grid">
      <label><input type="checkbox" id="macrocranie"> Macrocrânie</label>
      <label><input type="checkbox" id="cephalees"> Céphalées</label>
      <label><input type="checkbox" id="troubles_marche"> Marche</label>
      <label><input type="checkbox" id="incontinence"> Incontinence</label>
      <label><input type="checkbox" id="regard_soleil"> Regard soleil</label>
      <label><input type="checkbox" id="fontanelle_tendue"> Fontanelle</label>
      <label><input type="checkbox" id="troubles_memoire"> Mémoire</label>
    </div>
  </section>

  <!-- EXAMEN -->
  <section class="fiche-section">
    <h2>EXAMEN</h2>

    <div class="grid-3">
      <div class="form-group">
        <label>Poids (kg)</label>
        <input type="number" id="poids_kg">
      </div>

      <div class="form-group">
        <label>Taille (cm)</label>
        <input type="number" id="taille_cm">
      </div>

      <div class="form-group">
        <label>PC (cm)</label>
        <input type="number" id="pc_cm">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Glasgow</label>
        <input type="number" id="glasgow">
      </div>

      <div class="form-group">
        <label>Examen neurologique</label>
        <input type="text" id="examen_neuro">
      </div>
    </div>
  </section>

  <!-- IMAGERIE -->
  <section class="fiche-section">
    <h2>IMAGERIE</h2>

    <div class="grid-2">
      <div class="check-grid">
        <label><input type="checkbox" id="scanner"> Scanner</label>
        <label><input type="checkbox" id="irm"> IRM</label>
        <label><input type="checkbox" id="echographie"> Écho</label>
      </div>

      <div class="form-group">
        <label>Indice d'Evans</label>
        <input type="text" id="indice_evans">
      </div>
    </div>
  </section>

  <!-- BIOLOGIE -->
  <section class="fiche-section">
    <h2>BIOLOGIE</h2>

    <div class="grid-2">
      <div class="form-group">
        <label>Glycémie</label>
        <input type="text" id="glycemie">
      </div>

      <div class="form-group">
        <label>Protéinorachie</label>
        <input type="text" id="proteinorachie">
      </div>

      <div class="form-group">
        <label>Glycorachie</label>
        <input type="text" id="glycorachie">
      </div>

      <div class="form-group">
        <label>Cytologie</label>
        <input type="text" id="cytologie_lcr">
      </div>

      <div class="form-group">
        <label>Culture</label>
        <input type="text" id="culture_lcr">
      </div>
    </div>
  </section>

  <!-- PRISE EN CHARGE -->
  <section class="fiche-section">
    <h2>PRISE EN CHARGE</h2>

    <div class="grid-2">

      <div>
        <label>Intervention</label>
        <div class="inline">
          <label><input type="checkbox" id="dvp"> DVP</label>
          <label><input type="checkbox" id="dva"> DVA</label>
          <label><input type="checkbox" id="vcs"> VCS</label>
        </div>
      </div>

      <div class="form-group">
        <label>Date intervention</label>
        <input type="date" id="date_intervention">
      </div>

      <div class="form-group">
        <label>Type valve</label>
        <input type="text" id="type_valve">
      </div>

      <div>
        <label>Évolution</label>
        <div class="inline">
          <label><input type="checkbox" id="evo_favorable"> Favorable</label>
          <label><input type="checkbox" id="evo_stable"> Stable</label>
          <label><input type="checkbox" id="evo_defavorable"> Défavorable</label>
        </div>
      </div>

      <div class="form-group">
        <label>Dernière consultation</label>
        <input type="date" id="date_derniere_consultation">
      </div>

    </div>
  </section>

  <!-- ACTIONS -->
  <div class="actions">
    <button type="button" id="generateFiche">📄 Télécharger</button>
    <button type="reset">♻ Reset</button>
  </div>

</form>
</main>

<footer>
  <p>&copy; 2026 Fiche Technique</p>
</footer>

<script src="app.js"></script>
</body>
</html>
