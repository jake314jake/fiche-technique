<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche Technique : Hydrocéphalie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>FICHE TECHNIQUE : HYDROCÉPHALIE</h1>
</header>

<main>
<form id="ficheForm">

  <!-- IDENTIFICATION -->
  <section class="fiche-section">
    <h2>IDENTIFICATION DU PATIENT</h2>

    <div class="grid-2">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="nom">
      </div>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" id="prenom">
      </div>

      <div class="form-group">
        <label>Date de naissance</label>
        <input type="date" id="date_naissance">
      </div>

      <div class="form-group">
        <label>Sexe</label>
        <div class="inline-options">
          <label class="option">
            <span>M</span>
            <input type="radio" name="sexe" value="M">
          </label>
          <label class="option">
            <span>F</span>
            <input type="radio" name="sexe" value="F">
          </label>
        </div>
      </div>
    </div>
  </section>

  <!-- ANTECEDENTS -->
  <section class="fiche-section">
    <h2>ANTÉCÉDENTS</h2>

    <h3>Pédiatriques</h3>
    <div class="grid-2">
      <label class="check-row"><span>Prématurité</span><input type="checkbox" id="prematurite"></label>
      <label class="check-row"><span>Hémorragie intraventriculaire</span><input type="checkbox" id="hemorragie_iv"></label>
      <label class="check-row"><span>Spina bifida</span><input type="checkbox" id="spina_bifida"></label>
      <label class="check-row"><span>Méningite</span><input type="checkbox" id="meningite"></label>
    </div>

    <h3>Adultes</h3>
    <div class="grid-2">
      <label class="check-row"><span>Trauma crânien</span><input type="checkbox" id="tc"></label>
      <label class="check-row"><span>AVC / Hémorragie</span><input type="checkbox" id="avc"></label>
      <label class="check-row"><span>Tumeur</span><input type="checkbox" id="tumeur"></label>
      <label class="check-row"><span>Chirurgie antérieure</span><input type="checkbox" id="chirurgie_anterieure"></label>
    </div>
  </section>

  <!-- DECOUVERTE -->
  <section class="fiche-section">
    <h2>CIRCONSTANCES DE DÉCOUVERTE</h2>

    <div class="grid-2">
      <label class="check-row"><span>Macrocrânie</span><input type="checkbox" id="macrocranie"></label>
      <label class="check-row"><span>Céphalées / Vomissements</span><input type="checkbox" id="cephalees"></label>
      <label class="check-row"><span>Troubles de la marche</span><input type="checkbox" id="troubles_marche"></label>
      <label class="check-row"><span>Incontinence</span><input type="checkbox" id="incontinence"></label>
      <label class="check-row"><span>Regard soleil</span><input type="checkbox" id="regard_soleil"></label>
      <label class="check-row"><span>Fontanelle tendue</span><input type="checkbox" id="fontanelle_tendue"></label>
      <label class="check-row"><span>Troubles mémoire</span><input type="checkbox" id="troubles_memoire"></label>
    </div>
  </section>

  <!-- EXAMEN -->
  <section class="fiche-section">
    <h2>EXAMEN CLINIQUE</h2>

    <div class="grid-2">
      <div class="form-group">
        <label>Poids (kg)</label>
        <input type="number" id="poids_kg">
      </div>

      <div class="form-group">
        <label>Taille (cm)</label>
        <input type="number" id="taille_cm">
      </div>

      <div class="form-group">
        <label>Périmètre Crânien</label>
        <input type="number" id="pc_cm">
      </div>

      <div class="form-group">
        <label>Score Glasgow</label>
        <input type="number" id="glasgow">
      </div>

      <div class="form-group full">
        <label>Examen neurologique</label>
        <input type="text" id="examen_neuro">
      </div>
    </div>
  </section>

  <!-- IMAGERIE -->
  <section class="fiche-section">
    <h2>IMAGERIE</h2>

    <div class="grid-2">
      <label class="check-row"><span>Scanner</span><input type="checkbox" id="scanner"></label>
      <label class="check-row"><span>IRM</span><input type="checkbox" id="irm"></label>
      <label class="check-row"><span>Échographie</span><input type="checkbox" id="echographie"></label>
    </div>

    <div class="form-group">
      <label>Indice d'Evans</label>
      <input type="text" id="indice_evans">
    </div>
  </section>

  <!-- BIOLOGIE -->
  <section class="fiche-section">
    <h2>BIOLOGIE</h2>

    <div class="grid-2">
      <div class="form-group"><label>Glycémie</label><input type="text" id="glycemie"></div>
      <div class="form-group"><label>Protéinorachie</label><input type="text" id="proteinorachie"></div>
      <div class="form-group"><label>Glycorachie</label><input type="text" id="glycorachie"></div>
      <div class="form-group"><label>Cytologie</label><input type="text" id="cytologie_lcr"></div>
      <div class="form-group full"><label>Culture</label><input type="text" id="culture_lcr"></div>
    </div>
  </section>

  <!-- EVOLUTION -->
  <section class="fiche-section">
    <h2>PRISE EN CHARGE</h2>

    <div class="grid-2">
      <label class="check-row"><span>DVP</span><input type="checkbox" id="dvp"></label>
      <label class="check-row"><span>DVA</span><input type="checkbox" id="dva"></label>
      <label class="check-row"><span>Endoscopie</span><input type="checkbox" id="vcs"></label>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Date intervention</label>
        <input type="date" id="date_intervention">
      </div>

      <div class="form-group">
        <label>Type valve</label>
        <input type="text" id="type_valve">
      </div>

      <div class="form-group">
        <label>Dernière consultation</label>
        <input type="date" id="date_derniere_consultation">
      </div>
    </div>

    <h3>Évolution</h3>
    <div class="grid-3">
      <label class="check-row"><span>Favorable</span><input type="checkbox" id="evo_favorable"></label>
      <label class="check-row"><span>Stable</span><input type="checkbox" id="evo_stable"></label>
      <label class="check-row"><span>Défavorable</span><input type="checkbox" id="evo_defavorable"></label>
    </div>
  </section>

  <!-- ACTIONS -->
  <div class="actions">
    <button type="button">📄 Télécharger</button>
    <button type="reset">♻ Reset</button>
  </div>

</form>
</main>

<footer>
  <p>&copy; 2026 Fiche Technique</p>
</footer>

</body>
</html>
